[profile.default]
src = "src"
out = "out"
libs = ["lib"]
via_ir = true
optimizer = true
optimizer_runs = 200
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]

[rpc_endpoints]
fluent_testnet = "https://rpc.testnet.fluent.xyz/"
fluent_devnet  = "https://rpc.devnet.fluent.xyz/"

[etherscan]
fluent_testnet = { key = "no-api-key", url = "https://testnet.fluentscan.xyz/" }
fluent_devnet  = { key = "no-api-key", url = "https://devnet.fluentscan.xyz/" }
